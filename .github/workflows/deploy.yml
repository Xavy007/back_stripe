name: Deploy Backend → Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar dependencias y verificar sintaxis
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci --omit=dev

      - name: Verificar variables de entorno requeridas
        run: |
          echo "✅ Verificando configuración..."
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "❌ ERROR: RENDER_DEPLOY_HOOK_URL no está configurado en GitHub Secrets"
            exit 1
          fi
          echo "✅ Secrets configurados correctamente"

      - name: Disparar deploy en Render
        run: |
          echo "🚀 Iniciando deploy en Render..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Deploy disparado correctamente (HTTP $RESPONSE)"
          else
            echo "❌ Error al disparar deploy (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Esperar y verificar que el servidor responde
        run: |
          echo "⏳ Esperando 60 segundos a que Render finalice el deploy..."
          sleep 60
          echo "🔍 Verificando health check..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_API_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend activo y respondiendo (intento $i)"
              exit 0
            fi
            echo "⏳ Intento $i/5 — HTTP $STATUS, reintentando en 30s..."
            sleep 30
          done
          echo "⚠️ El servidor no respondió en el tiempo esperado (puede seguir iniciando)"
