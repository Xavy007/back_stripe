version: '3.8'

services:

  # ── Base de datos PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: dotset
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Base de datos MongoDB ─────────────────────────────────
  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  # ── Aplicación Backend ────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      # PostgreSQL (nombres de variables que usa config/config.js)
      DB_NAME: dotset
      DB_USER: postgres
      DB_PWD: admin123
      DB_HOST: postgres
      # MongoDB (apunta al servicio de arriba)
      MONGODB_URI: mongodb://mongodb:27017/dotset
      # JWT
      JWT_SECRET: clave_secreta_segura_minimo_32_caracteres
      # CORS
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: production
    depends_on:
      - postgres
      - mongodb
    volumes:
      - ./uploads:/usr/src/app/uploads

  # ── Aplicación Frontend ───────────────────────────────────
  frontend:
    build: ../../Frontend/puntoset
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  pgdata:
  mongodata:
