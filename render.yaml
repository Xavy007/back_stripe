# render.yaml — Blueprint de infraestructura para Render.com
# Documentación: https://render.com/docs/blueprint-spec
#
# Servicios definidos:
#   1. dotset-api   → Web Service (Node.js via Docker)
#   2. dotset-db    → PostgreSQL (base de datos relacional)
#
# MongoDB: usar MongoDB Atlas Free Tier (M0) — render.com no lo incluye gratis.
# Enlace: https://www.mongodb.com/cloud/atlas/register

services:

  # ── Backend Node.js ──────────────────────────────────────────────────────
  - type: web
    name: dotset-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      # Las siguientes se configuran manualmente en el dashboard de Render
      - key: JWT_SECRET
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PWD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
